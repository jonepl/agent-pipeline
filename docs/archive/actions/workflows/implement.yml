name: Implement

on:
  issues:
    types: [labeled]

jobs:
  implement:
    if: github.event.label.name == 'plan-approved'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: write

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      GH_HOST: github.com
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      ISSUE_TITLE: ${{ github.event.issue.title }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install dependencies
        run: npm ci

      - name: Build Sandcastle Docker image
        run: npx sandcastle docker build-image

      - name: Run implementer and reviewer in sandbox
        run: npx tsx .github/scripts/implement.mts

      - name: Advance to verifying
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --add-label "verifying" \
            --remove-label "plan-approved"

      - name: Park on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --add-label "needs-human"
          gh issue comment "$ISSUE_NUMBER" \
            --body "Implementation failed. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
